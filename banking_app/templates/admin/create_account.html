{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm" style="border-radius:16px;overflow:hidden;">
        <div class="card-header py-4 border-0 text-center" style="background:linear-gradient(135deg,#003366,#005599);">
          <i class="fas fa-university fa-2x mb-2" style="color:#FFD700;"></i>
          <h4 class="text-white fw-bold mb-0">Create Bank Account</h4>
        </div>
        <div class="card-body p-4">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}<div class="alert alert-{{ cat }} py-2">{{ msg }}</div>{% endfor %}
          {% endwith %}
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">User Email</label>
              <input type="email" name="email" class="form-control" required placeholder="user@email.com">
              <small class="text-muted">The account will be linked to this user</small>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Account Type</label>
              <select name="account_type" class="form-select">
                <option value="savings">Savings</option>
                <option value="current">Current</option>
                <option value="fixed">Fixed Deposit</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Initial Deposit (PKR)</label>
              <input type="number" name="initial_deposit" class="form-control" value="0" min="0" step="0.01">
            </div>
            <button type="submit" class="btn w-100 fw-bold py-2" style="background:#FFD700;color:#003366;">
              <i class="fas fa-plus me-2"></i>Create Account
            </button>
            <a href="{{ url_for('admin.accounts') }}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
