{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm" style="border-radius:16px;overflow:hidden;">
        <div class="card-header py-4 border-0 text-center" style="background:linear-gradient(135deg,#003366,#005599);">
          <i class="fas fa-user-plus fa-2x mb-2" style="color:#FFD700;"></i>
          <h4 class="text-white fw-bold mb-0">Create User Account</h4>
        </div>
        <div class="card-body p-4">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} alert-dismissible fade show py-2">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            {% endfor %}
          {% endwith %}
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="full_name" class="form-control" required placeholder="e.g. Muhammad Ali">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <input type="email" name="email" class="form-control" required placeholder="user@email.com">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Phone Number</label>
              <input type="text" name="phone" class="form-control" required placeholder="03XXXXXXXXX">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Role</label>
              <select name="role" class="form-select">
                <option value="client">Client</option>
                <option value="staff">Bank Staff</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required placeholder="Minimum 8 characters">
            </div>
            <button type="submit" class="btn w-100 fw-bold py-2" style="background:#FFD700;color:#003366;">
              <i class="fas fa-check me-2"></i>Create Account
            </button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
