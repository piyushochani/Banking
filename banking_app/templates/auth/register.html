{% extends "base.html" %}

{% block content_public %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow" style="border-radius:16px; overflow:hidden;">
        <div class="card-header text-center py-4 border-0" style="background:linear-gradient(135deg,#003366,#005599);">
          <i class="fas fa-user-plus fa-2x mb-2" style="color:#FFD700;"></i>
          <h4 class="text-white fw-bold mb-0">Create Your Account</h4>
        </div>
        <div class="card-body p-4">
          <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" name="first_name" class="form-control" placeholder="First name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" name="last_name" class="form-control" placeholder="Last name" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Phone Number</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="text" name="phone" class="form-control" placeholder="Phone number" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Min 8 chars, 1 upper, 1 number, 1 special" required>
              </div>
              <small class="text-muted">Must have uppercase, lowercase, number and special character (!@#$%)</small>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat your password" required>
              </div>
            </div>

            <button type="submit" class="btn w-100 fw-bold py-2" style="background:#FFD700; color:#003366;">
              <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
          </form>
          <hr>
          <p class="text-center text-muted mb-0">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color:#003366;" class="fw-bold">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content_public %}
