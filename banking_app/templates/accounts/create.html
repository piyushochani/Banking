{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm" style="border-radius:16px; overflow:hidden;">
        <div class="card-header py-4 border-0" style="background:linear-gradient(135deg,#003366,#005599);">
          <h4 class="text-white fw-bold mb-0 text-center"><i class="fas fa-plus-circle me-2" style="color:#FFD700;"></i>Create Bank Account</h4>
        </div>
        <div class="card-body p-4">
          <form method="POST" action="{{ url_for('accounts.create') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            {% if current_user.get_role() in ['admin', 'staff'] %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Client Email</label>
              <input type="email" name="client_email" class="form-control" placeholder="Client's email address" required>
            </div>
            {% endif %}

            <div class="mb-3">
              <label class="form-label fw-semibold">Account Type</label>
              <select name="account_type" class="form-select" required>
                <option value="">Select account type</option>
                <option value="savings">Savings</option>
                <option value="current">Current</option>
                <option value="fixed">Fixed Deposit</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Initial Deposit (PKR)</label>
              <input type="number" name="initial_deposit" class="form-control" placeholder="0.00" min="0" step="0.01">
            </div>

            <button type="submit" class="btn w-100 fw-bold py-2" style="background:#FFD700; color:#003366;">
              <i class="fas fa-university me-2"></i>Create Account
            </button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
